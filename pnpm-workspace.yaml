packages:
  - 'apps/*'
  - 'packages/*'

# ============================================================
# pnpm 11 settings (single source of truth; do NOT create .npmrc)
# ============================================================
saveExact: true
autoInstallPeers: true
dedupePeerDependents: true
strictPeerDependencies: false
linkWorkspacePackages: true
preferWorkspacePackages: true

# Catalog adoption policy (vite-plus monorepo template default).
# `prefer` means new `pnpm add` writes `catalog:` references when the
# package already exists in the catalog below, but allows opt-out.
catalogMode: prefer

allowBuilds:
  esbuild: true
  '@swc/core': true
  sharp: true
  workerd: true
  core-js: false
  protobufjs: false

# ============================================================
# Vite+ ecosystem overrides (mandatory).
#
# `@voidzero-dev/vite-plus-core` is the Vite+ flavored Vite build.
# We redirect every transitive `vite` import to that scoped package
# via npm-alias syntax in the catalog, then apply that alias
# workspace-wide with `overrides`. Vitest stays pinned to the upstream
# version bundled by the local Vite+ release so the runner internals
# stay single-copy across direct test imports and `vp test`.
#
# Source: https://viteplus.dev (monorepo template)
# ============================================================
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

# Silence peer-range mismatches caused by the alias: the alias points
# at a 0.1.x package while plugins declare peers like `vite: ^8`.
# Functionality is identical; version numbers just don't match.
#
# `typescript` is also listed because the catalog pins TS 6.x, but several
# packages (e.g. @astrojs/check, tsconfck) still declare `typescript: ^5.0.0`
# in their peerDependencies. TS 6.x is API-compatible for these consumers;
# allow the mismatch instead of holding the workspace back to TS 5.
peerDependencyRules:
  allowAny:
    - vite
    - vitest
    - typescript
  allowedVersions:
    vite: '*'
    vitest: '*'
    typescript: '*'

# ============================================================
# Catalog · single source of truth for every external version.
#
# Rules (docs/dev-file/01 §3):
#   1. All apps/* and packages/* dependencies MUST use
#      "catalog:" — never a literal version, never "^x.y.z",
#      never "latest".
#   2. Every entry here is PINNED (exact). `saveExact: true`
#      enforces this for future `pnpm add` / `vp add`.
#   3. Upgrades = edit this file + `vp install`.
# ============================================================
catalog:
  # ───────── Vite+ unified toolchain ─────────
  # Vite+ and its core alias move together; Vitest matches the version
  # bundled by the local Vite+ release.
  vite-plus: 0.2.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vitest: 4.1.9
  tsx: 4.23.0

  # ───────── runtime core ─────────
  typescript: 6.0.3
  '@typescript/native-preview': 7.0.0-dev.20260705.1
  '@types/node': 25.9.4

  # ───────── Vite plugin ecosystem ─────────
  # These plugins consume the aliased `vite` from the overrides above;
  # they never see the vanilla npm vite.
  '@vitejs/plugin-react': 6.0.3
  '@tailwindcss/vite': 4.3.2

  # ───────── frontend ─────────
  '@base-ui/react': 1.6.0
  react: 19.2.7
  react-dom: 19.2.7
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  react-router: 7.18.1
  read-excel-file: 9.2.0
  tailwindcss: 4.3.2
  lucide-react: 1.23.0
  qrcode.react: 4.2.0
  class-variance-authority: 0.7.1
  tailwind-merge: 3.6.0
  tw-animate-css: 1.4.0
  clsx: 2.1.1
  cmdk: 1.1.1
  sonner: 2.0.7
  agentation: 3.0.2
  foxact: 0.3.8

  # ───────── state / form ─────────
  '@tanstack/react-query': 5.101.2
  '@tanstack/react-form': 1.33.0
  '@tanstack/react-hotkeys': 0.10.0
  '@tanstack/react-table': 8.21.3
  '@tanstack/react-virtual': 3.14.5
  zustand: 5.0.14
  nuqs: 2.9.0
  zod: 4.4.3

  # ───────── animation ─────────
  motion: 12.42.2
  canvas-confetti: 1.9.4
  react-odometerjs: 3.1.3

  # ───────── backend ─────────
  hono: 4.12.27
  '@hono/zod-validator': 0.7.6
  fflate: 0.8.3
  pdf-lib: 1.17.1
  pdfjs-dist: 5.7.284

  # ───────── oRPC ─────────
  '@orpc/contract': 1.14.6
  '@orpc/server': 1.14.6
  '@orpc/client': 1.14.6
  '@orpc/tanstack-query': 1.14.6
  '@orpc/openapi': 1.14.6

  # ───────── auth ─────────
  '@t3-oss/env-core': 0.13.11
  better-auth: 1.6.23
  '@better-auth/stripe': 1.6.23
  stripe: 22.3.0

  # ───────── db ─────────
  drizzle-orm: 0.45.2

  # ───────── ai ─────────
  ai: 6.0.219
  ai-gateway-provider: 3.2.0

  # ───────── i18n (Lingui v6) ─────────
  # Macros import from @lingui/core/macro & @lingui/react/macro;
  # the Babel plugin package transforms them at build time.
  '@lingui/core': 6.4.0
  '@lingui/react': 6.4.0
  '@lingui/cli': 6.4.0
  '@lingui/format-po': 6.4.0
  '@lingui/vite-plugin': 6.4.0
  '@lingui/babel-plugin-lingui-macro': 6.4.0
  # @vitejs/plugin-react v6 dropped Babel; Lingui macros run through
  # Rolldown's Babel plugin using Lingui's v6 transformer preset.
  '@rolldown/plugin-babel': 0.2.3

  # ───────── infra / transport ─────────
  resend: 6.17.1
  postal-mime: 2.7.5
  '@react-email/components': 1.0.12

  # ───────── cloudflare ─────────
  wrangler: 4.107.0
  '@cloudflare/workers-types': 4.20260702.1

  # ───────── marketing (Astro static site) ─────────
  # Used only by apps/marketing. Astro 6 internally uses Vite 7; the
  # workspace `vite` override aliases it to vite-plus-core, with peer
  # mismatches silenced via `peerDependencyRules.allowAny: [vite]`.
  # `@astrojs/react` will be added back once a real React island is
  # introduced; the v1 landing is HTML-only to keep JS budget < 50 KB gz.
  astro: 6.4.8
  '@astrojs/sitemap': 3.7.3
  '@astrojs/check': 0.9.9

  # ───────── test adapters / env / e2e ─────────
  # The pool driver peers on `vitest: ^4.x`; keep the workspace pin
  # aligned with the Vitest version bundled by Vite+.
  '@cloudflare/vitest-pool-workers': 0.14.9
  happy-dom: 20.10.6
  '@playwright/test': 1.61.1
  msw: 2.14.6
  '@amplitude/analytics-browser': 2.44.4
  gsap: 3.15.0
