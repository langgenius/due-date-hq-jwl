const LS = "ddhq_review_v1";
let store = JSON.parse(localStorage.getItem(LS) || "{}");
let cfg = JSON.parse(localStorage.getItem(LS+"_cfg") || "{}");
let sel = null;
const $=s=>document.querySelector(s);
$("#sender").value=cfg.sender||""; $("#addr").value=cfg.addr||"";
[...new Set(DATA.map(d=>d.state))].sort().forEach(s=>{let o=document.createElement("option");o.textContent=s;$("#fState").appendChild(o)});

function saveCfg(){cfg.sender=$("#sender").value;cfg.addr=$("#addr").value;localStorage.setItem(LS+"_cfg",JSON.stringify(cfg));renderDetail()}
$("#sender").oninput=saveCfg; $("#addr").oninput=saveCfg;
["#fState","#fChan","#fStat","#q"].forEach(s=>$(s).oninput=renderList);

function footer(){let s=$("#sender").value||"[SENDER]";let a=$("#addr").value.trim();
  return "\n\n—\n"+s+(a?"\n"+a:"")+"\nPrefer not to hear from me? Just reply and I'll stop.";}
function fill(t){return (t||"").split("[SENDER]").join($("#sender").value||"[SENDER]");}
function withFoot(b){return fill(b)+footer();}
function st(i){return store[i]||{}}
function status(i){return st(i).status||"pending"}

function renderList(){
  const fs=$("#fState").value,fc=$("#fChan").value,fst=$("#fStat").value,q=$("#q").value.toLowerCase();
  const L=$("#list");L.innerHTML="";
  let shown=0;
  DATA.forEach(d=>{
    if(fs&&d.state!=fs)return; if(fc&&d.channel!=fc)return;
    const stt=status(d.i); if(fst&&stt!=fst)return;
    if(q&&!d.firm.toLowerCase().includes(q))return;
    shown++;
    const r=document.createElement("div");r.className="row"+(sel===d.i?" sel":"");
    r.onclick=()=>{sel=d.i;renderList();renderDetail()};
    r.innerHTML=`<span class="dot ${stt==='ok'?'ok':stt==='skip'?'skip':''}"></span>
      <div><div class="nm">${esc(d.firm)}</div><div class="meta">${esc(d.city)}, ${d.state} · ${d.channel} · ${d.fit}</div></div>`;
    L.appendChild(r);
  });
  const ok=DATA.filter(d=>status(d.i)==='ok').length;
  $("#prog").textContent=`${ok} approved · ${shown} shown · ${DATA.length} total`;
}
function field(label,val,id){return `<label>${label}</label><input class="subj" id="${id}" value="${esc(val)}">`;}
function area(label,val,id){return `<label>${label}</label><textarea id="${id}">${esc(val)}</textarea>`;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function mailto(d,s,b){return `mailto:${encodeURIComponent(d.contact)}?subject=${encodeURIComponent(fill(s))}&body=${encodeURIComponent(withFoot(b))}`}

function touchBlock(d,n){
  const e=st(d.i);
  const s=e["s"+n]??d["s"+n], b=e["b"+n]??d["b"+n];
  if(!b || b.startsWith("(contact form"))return n===1?"":"";
  let ml = d.channel==="Email" ? `<a class="ml" href="${mailto(d,s,b)}">✉ Open in mail</a>` : "";
  return `<h3>Touch ${n}${n==1?" · day 0":n==2?" · day 4–5":" · day 10–12"}</h3>
    ${field("Subject","" .concat(s),"s"+n+"_"+d.i)}
    ${area("Body (final = sign-off + footer auto-applied on export)",b,"b"+n+"_"+d.i)}
    <div class="foot">Footer auto-appended:${esc(footer())}</div>
    <div class="btns">${ml}</div>`;
}
function renderDetail(){
  if(sel===null)return;
  const d=DATA.find(x=>x.i===sel);const stt=status(d.i);
  const blocks = d.channel==="Contact form" ? touchBlock(d,1) : [1,2,3].map(n=>touchBlock(d,n)).join("");
  $("#detail").innerHTML=`<div class="card">
    <div style="font-size:17px;font-weight:600">${esc(d.firm)}</div>
    <div class="muted" style="margin:3px 0 8px">${esc(d.city)}, ${d.state}</div>
    <span class="tag">${d.fit}</span><span class="tag">${d.channel}</span>
    <div style="margin-top:8px"><b>To:</b> ${esc(d.contact)} &nbsp; <b>Contact:</b> ${esc(d.dm||"—")}</div>
    ${d.notes?`<div class="muted" style="margin-top:6px">⚑ ${esc(d.notes)}</div>`:""}
    <div class="btns">
      <button class="approve ${stt==='ok'?'on':''}" onclick="setS(${d.i},'ok')">✓ Approve</button>
      <button class="skip ${stt==='skip'?'on':''}" onclick="setS(${d.i},'skip')">Skip</button>
    </div></div>
    <div class="card">${blocks}</div>`;
  // wire edits
  [1,2,3].forEach(n=>{
    ["s","b"].forEach(k=>{const el=$("#"+k+n+"_"+d.i);if(el)el.oninput=()=>{const e=st(d.i);e[k+n]=el.value;store[d.i]=e;save()}});
  });
}
function setS(i,v){const e=st(i);e.status=(e.status===v?"pending":v);store[i]=e;save();renderList();renderDetail()}
function save(){localStorage.setItem(LS,JSON.stringify(store))}

function exportApproved(){
  const ap=DATA.filter(d=>status(d.i)==='ok');
  if(!ap.length){alert("Approve some firms first.");return;}
  const cols=["Firm","City","State","Channel","To","Subject1","Email1","Subject2","Email2","Subject3","Email3"];
  const esc2=s=>'"'+String(s||"").replace(/"/g,'""')+'"';
  const lines=[cols.join(",")];
  ap.forEach(d=>{const e=st(d.i);const g=(k,n)=>e[k+n]??d[k+n];
    const body=n=>{const b=g("b",n);return (!b||b.startsWith("(contact form"))?"":withFoot(b)};
    lines.push([d.firm,d.city,d.state,d.channel,d.contact,
      fill(g("s",1)),body(1),fill(g("s",2)),body(2),fill(g("s",3)),body(3)].map(esc2).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="duedatehq-approved.csv";a.click();
}
renderList();
</script></body></html>
