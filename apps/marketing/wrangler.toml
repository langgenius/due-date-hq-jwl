name = "due-date-hq-marketing-staging"
compatibility_date = "2025-04-01"

# -------------------------------------------------------------
# Static Assets · Astro static output (no SSR adapter).
# Serves the marketing site at https://due.langgenius.app.
# `not_found_handling = "404-page"` looks for /404.html on misses
# (vs SPA fallback used by apps/server). Astro emits 404.html when
# present; otherwise Workers returns its default 404.
# -------------------------------------------------------------
[assets]
directory = "./dist"
not_found_handling = "404-page"

# -------------------------------------------------------------
# Public env vars surfaced at build time (Astro `import.meta.env`).
# Marketing never holds backend secrets; only PUBLIC_* are allowed.
# -------------------------------------------------------------
[vars]
PUBLIC_APP_URL = "https://app.due.langgenius.app"

[observability]
enabled = true
