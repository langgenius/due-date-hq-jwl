name = "due-date-hq-app-staging"
account_id = "305dbc7da819eb47bb3f3f3bc8927046"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# -------------------------------------------------------------
# Static Assets · SaaS SPA dist from apps/app
#   not_found_handling = "single-page-application" → SPA fallback
#   run_worker_first  → Worker owns /rpc/* and /api/* first
#   Marketing pages are deployed separately from apps/marketing.
# -------------------------------------------------------------
[assets]
directory = "../app/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/rpc/*", "/api/*"]

# -------------------------------------------------------------
# Observability
# -------------------------------------------------------------
[observability]
enabled = true

# -------------------------------------------------------------
# D1 · primary OLTP
# -------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "due-date-hq-staging"
database_id = "41f2cef8-1209-42ce-a697-e4269bb75676"
migrations_dir = "../../packages/db/migrations"

# -------------------------------------------------------------
# KV · session hot data · rate-limit counters · AI day budgets
# -------------------------------------------------------------
[[kv_namespaces]]
binding = "CACHE"
id = "6da8c64be40f4610b08794324815bb24"

# -------------------------------------------------------------
# R2 · migration raw / generated PDFs / audit zips / pulse raw snapshots
# -------------------------------------------------------------
[[r2_buckets]]
binding = "R2_PDF"
bucket_name = "due-date-hq-pdf-staging"

[[r2_buckets]]
binding = "R2_MIGRATION"
bucket_name = "due-date-hq-migration-staging"

[[r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "due-date-hq-audit-staging"

[[r2_buckets]]
binding = "R2_PULSE"
bucket_name = "due-date-hq-pulse-staging"

# -------------------------------------------------------------
# Rate Limiting binding
# -------------------------------------------------------------
[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# -------------------------------------------------------------
# Queues · email outbox + pulse extract
# -------------------------------------------------------------
[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "due-date-hq-email-staging"

[[queues.producers]]
binding = "PULSE_QUEUE"
# 2026-06-25: recreated as -v2 to escape a stuck queue-consumer version-freeze
# (CF support case #02201745, on CF's advice) — a brand-new queue forces a fresh
# consumer registration on the current Worker version. Old queue left in place
# (revertible). DLQ reused.
queue = "due-date-hq-pulse-staging-v2"

[[queues.producers]]
binding = "DASHBOARD_QUEUE"
queue = "due-date-hq-dashboard-staging"

[[queues.producers]]
binding = "AUDIT_QUEUE"
queue = "due-date-hq-audit-staging"

[[queues.producers]]
binding = "SOCIAL_QUEUE"
queue = "due-date-hq-social-staging"

[[queues.consumers]]
queue = "due-date-hq-email-staging"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "due-date-hq-email-dlq-staging"

# max_concurrency caps how many consumer invocations Cloudflare runs in parallel.
# Without it, Queues autoscales aggressively and fires hundreds of near-simultaneous
# fetches. Per-host pacing comes from two layers in jobs/pulse/ingest.ts: (1) the
# enqueue path host-groups due sources so one host's fetches ride ONE message and run
# sequentially through one polite clock, and (2) createPoliteFetch instances share an
# isolate-wide 30s/host slot clock (isolatePoliteHostState) as the in-isolate backstop
# for chunk-split groups, retries and the rules-scan path. max_concurrency=5 remains
# the global cap on parallel invocations (raised 2→5 once browserless was retired).
[[queues.consumers]]
queue = "due-date-hq-pulse-staging-v2"
max_batch_size = 10
max_batch_timeout = 5
# Retry cap: a persistently-failing snapshot (e.g. AI provider down) is retried
# at most 3× then routed to the DLQ (drained + alerted), instead of looping.
max_retries = 3
max_concurrency = 5
dead_letter_queue = "due-date-hq-pulse-dlq-staging"

# Drains the Pulse dead-letter queue: snapshots that exhausted max_retries above.
# The consumer (jobs/queue.ts → drainDeadLetterBatch) emits a pulse.queue.dead_letter
# alert and acks so poisoned messages are observable instead of dying silently.
# No retries / no chained DLQ — draining must not re-run the failing handler.
[[queues.consumers]]
queue = "due-date-hq-pulse-dlq-staging"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

[[queues.consumers]]
queue = "due-date-hq-dashboard-staging"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "due-date-hq-dashboard-dlq-staging"

[[queues.consumers]]
queue = "due-date-hq-audit-staging"
max_batch_size = 3
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "due-date-hq-audit-dlq-staging"

# X creates are non-idempotent at the remote API boundary. One-message batches
# and one consumer invocation keep dispatch serialized; application state guards
# prevent redelivery from issuing a second create request.
[[queues.consumers]]
queue = "due-date-hq-social-staging"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
max_concurrency = 1
dead_letter_queue = "due-date-hq-social-dlq-staging"

[[queues.consumers]]
queue = "due-date-hq-social-dlq-staging"
max_batch_size = 10
max_batch_timeout = 5
# The drain performs a D1 CAS to unknown before acking. Retry transient D1
# failures so an ambiguous X create can never disappear as an untracked run.
max_retries = 3
max_concurrency = 1

# -------------------------------------------------------------
# Cron Triggers · pulse ingest + reminder dispatch
# -------------------------------------------------------------
[triggers]
crons = ["*/30 * * * *"]

[vars]
ENV = "staging"
AUTH_URL = "https://app.duedatehq.com"
APP_URL = "https://app.duedatehq.com"
EMAIL_FROM = "noreply@duedatehq.com"
# Operator-grade alert sink (cron branch failures, stale-source watchdog, queue
# dead-letters, extraction canary) — emailed via Resend, deduped 6h per alert
# name. Empty disables the sink; alerts then only reach Workers Logs, which
# nobody watches (the 2026-06-08 fetch stall ran 38h unnoticed that way).
OPS_ALERT_EMAIL = "hanxujiang@dify.ai"
GOOGLE_CLIENT_ID = "480976975475-0vfvthp6eu461ji38nn8krp178ld9388.apps.googleusercontent.com"
AI_GATEWAY_ACCOUNT_ID = "305dbc7da819eb47bb3f3f3bc8927046"
AI_GATEWAY_SLUG = "duedatehq"
AI_GATEWAY_PROVIDER = "openrouter"
# Single model across all tiers (plan-based routing retired). Effort is tiered:
# quality tasks (pulse/rule/brief/insights) run reasoning.effort=high for accuracy; fast
# tasks (CSV mapper/normalizer/readiness) run low to stay fast & cheap on the import path.
AI_GATEWAY_MODEL_FAST_JSON = "google/gemini-3.5-flash"
AI_GATEWAY_MODEL_QUALITY_JSON = "google/gemini-3.5-flash"
AI_GATEWAY_MODEL_REASONING = "google/gemini-3.5-flash"
AI_GATEWAY_QUALITY_REASONING_EFFORT = "high"
AI_GATEWAY_FAST_REASONING_EFFORT = "low"
# Global daily ceiling on system (no-firmId) AI calls — pulse extraction + rule
# concrete-draft warming. Cost circuit-breaker: the per-firm fair-use limit can't
# gate firmId-less system jobs, so without this a runaway loop has no cost bound
# (this is how the OpenRouter balance was drained in 2026-06). Tune as needed.
AI_SYSTEM_DAILY_LIMIT = "1500"
# Public no-signup demo (GET /api/demo). OFF by default. To enable: (1) seed the
# brightline demo firm + data into this env's D1 (pnpm db:seed:demo), (2) flip
# this to "true", AND (3) set marketing PUBLIC_ENABLE_DEMO="true" so the Hero
# "Try a live demo" button appears. The demo session is server-enforced read-only.
ENABLE_PUBLIC_DEMO = "false"
# Social posting fails closed unless the operator has configured all four OAuth
# 1.0a user credentials plus SOCIAL_OPS_TOKEN and verified the fixed account.
X_POSTING_MODE = "live"
# Pulse rows older than this deployment cutover never enter the automatic social
# candidate scan; operators can still add a specific historical Pulse manually.
X_SOCIAL_START_AT = "2026-07-21T00:00:00.000Z"
# 2026-06-23: migrated off browserless.io (cost) to Cloudflare Browser Rendering.
# createBrowserlessFetch switches on the host: this *.cloudflare.com endpoint uses
# CF's /content REST API (Bearer auth via PULSE_BROWSERLESS_TOKEN = a CF API token
# scoped "Browser Rendering: Edit"). Rollback = restore the browserless.io URL AND
# re-set the browserless.io token. ~$0: 10 browser-hrs/mo included in Workers Paid.
# 2026-06-27: PULSE_BROWSERLESS_TOKEN rotated to a fresh least-privilege CF token
# (Browser Rendering: Edit only) — the prior token began returning 401 code 10000
# (auth error) once the queue consumer unfroze and started hitting the CF endpoint.
PULSE_BROWSERLESS_URL = "https://api.cloudflare.com/client/v4/accounts/305dbc7da819eb47bb3f3f3bc8927046/browser-rendering/content"
# Inbound email attribution gate (jobs/pulse/govdelivery.ts): matched official
# sources require sender-domain + passing DKIM/SPF verdicts before their mail
# can queue extraction. Set to "false" only to debug legitimate mail being
# rejected (the pulse.email.auth_reject ops alert names the failing reason).
PULSE_EMAIL_REQUIRE_AUTH = "true"
# The old 400-failures were a client bug (invalid fields sent to /content),
# fixed in browserless.ts. Re-add IDs here only for sources that genuinely need
# a headless browser. mt/pa render their newsroom list client-side (JS), so a
# direct fetch sees an empty shell. 2026-06-10: added the WAF/TLS-blocked hosts
# (tax.ohio.gov 404s, azdor.gov/michigan.gov/dor.ri.gov/revenue.nh.gov 403,
# ksrevenue.gov TLS-resets non-browser clients) — 26 ids across 6 hosts,
# ~7.5 extra browserless fetches/day at their cadences. Verify in prod
# source-health (/rules/sources) after deploy; revert if browserless regresses.
# 2026-06-11: az.pass_through_entities/az.withholding_due_dates/nh.business_tax
# (PDF targets) moved back to direct fetch — /content renders HTML only and
# returned 'Invalid PDF structure' bodies for them in prod.
# nh.temporary_announcements is a section-link hub, so a browser can't help it
# either — it needs a real press-release listing URL (still open).
# 2026-06-23: on Cloudflare Browser Rendering (networkidle0 wait), added ar + ut.
# 2026-07-10: ar moved to DFA's official WordPress custom-post RSS feed, which avoids
# both the rendered page's navigation noise and the headless-browser dependency. ut
# remains here because its CMS news list still loads through async XHR.
PULSE_BROWSERLESS_SOURCE_IDS = "pa.temporary_announcements,oh.sales_tax_rate_changes,az.temporary_announcements,ks.temporary_announcements,mi.temporary_announcements,nh.temporary_announcements,ri.temporary_announcements,mi.treasury_disaster_relief,az.individual_estimated_tax,az.fiduciary_income_tax,az.corporate_income_tax,az.tpt_due_dates,ks.tax_calendar,mi.individual_estimated_tax,mi.fiduciary_income_tax,mi.corporate_income_tax,mi.flow_through_entity_tax,mi.sales_use_tax,mi.withholding_due_dates,mi.ui_wage_report,wi.temporary_announcements,ut.temporary_announcements"

# Current stage uses a single top-level Worker configuration.
# Add named environments only when each env has its own complete bindings
# because Cloudflare bindings are not inherited by [env.*] blocks.
