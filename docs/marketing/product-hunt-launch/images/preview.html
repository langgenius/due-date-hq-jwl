<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>DueDateHQ · PH gallery preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1626; color: #C9D2E0; font-family: -apple-system, system-ui, sans-serif; padding: 40px 24px 80px; }
  h1 { color: #F3EEE6; font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #7d8aa3; margin-bottom: 36px; }
  .grid { max-width: 1320px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
  figure { background: #1a2336; border: 1px solid rgba(255,255,255,.08); border-radius: 14px; overflow: hidden; box-shadow: 0 24px 60px -20px rgba(0,0,0,.6); }
  figure img { display: block; width: 100%; height: auto; }
  figcaption { display: flex; align-items: baseline; gap: 10px; padding: 14px 20px; font-size: 13px; color: #9fb0cc; border-top: 1px solid rgba(255,255,255,.06); }
  figcaption b { color: #F3EEE6; font-weight: 600; }
  figcaption .n { font-family: ui-monospace, monospace; color: #14C5F6; font-size: 12px; }
  .alt-note { text-align: center; font-size: 12px; color: #5f6d86; margin-top: 44px; }
</style>
</head>
<body>
  <h1>DueDateHQ — Product Hunt gallery</h1>
  <div class="sub">10 slides · 1270×820 (rendered @2×) · scroll to review</div>
  <div class="grid">
    <figure><img src="ph-final-1-cover.png" alt="Cover"><figcaption><span class="n">1</span><b>Cover</b> — the hook</figcaption></figure>
    <figure><img src="ph-final-2-today.png" alt="Today"><figcaption><span class="n">2</span><b>Today</b> — your morning read</figcaption></figure>
    <figure><img src="ph-final-3-monitoring.png" alt="Monitoring"><figcaption><span class="n">3</span><b>Monitoring</b> — 50 states, alive map</figcaption></figure>
    <figure><img src="ph-final-4-sources.png" alt="Sources"><figcaption><span class="n">4</span><b>Sources</b> — provenance over the Sources list</figcaption></figure>
    <figure><img src="ph-final-5-action.png" alt="Action"><figcaption><span class="n">5</span><b>Action</b> — apply + affected-clients, over the Alerts list</figcaption></figure>
    <figure><img src="ph-final-6-completeness.png" alt="Completeness"><figcaption><span class="n">6</span><b>Completeness</b> — filing status + 2/4 docs</figcaption></figure>
    <figure><img src="ph-final-7-clients.png" alt="Clients"><figcaption><span class="n">7</span><b>Clients</b> — the whole book by urgency</figcaption></figure>
    <figure><img src="ph-final-8-rules-review.png" alt="Rules review"><figcaption><span class="n">8</span><b>Rules review</b> — Accept/Reject over the Jurisdictions list</figcaption></figure>
    <figure><img src="ph-final-9-activity.png" alt="Audit log"><figcaption><span class="n">9</span><b>Audit log</b> — append-only history</figcaption></figure>
    <figure><img src="ph-final-10-closer.png" alt="Closer"><figcaption><span class="n">10</span><b>Closer</b> — CTA + offer</figcaption></figure>
  </div>
  <div class="alt-note">Every slide carries the lockup + light footer · alternates live in <code>images/alternates/</code></div>
</body>
</html>
