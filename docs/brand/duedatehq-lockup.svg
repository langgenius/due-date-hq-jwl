<svg xmlns="http://www.w3.org/2000/svg" width="360" height="72" viewBox="0 0 360 72" role="img" aria-label="DueDateHQ logo lockup">
  <title>DueDateHQ — primary horizontal lockup</title>
  <desc>Stacked-bars mark, the DueDate serif wordmark with a quiet HQ tag, hairline divider, and the "for CPA firms" tagline.</desc>
  <rect x="8" y="8" width="56" height="56" rx="12" fill="#0A2540"/>
  <g transform="translate(15.04 19.55) scale(0.196)" fill="#F3EEE6">
    <rect width="187" height="36" rx="10"/>
    <rect y="44" width="187" height="36" rx="10"/>
    <rect x="27" y="88" width="187" height="36" rx="10"/>
    <rect y="132" width="187" height="36" rx="10"/>
  </g>
  <text x="80" y="45" font-family="ui-serif, 'Iowan Old Style', 'Palatino Linotype', Georgia, 'Times New Roman', serif" font-size="30" font-weight="500" letter-spacing="-0.4" fill="#0A2540">DueDate<tspan font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="1.1" dx="4" fill="#5B6B7D">HQ</tspan></text>
  <line x1="248" y1="24" x2="248" y2="50" stroke="#0A2540" stroke-opacity="0.22" stroke-width="1"/>
  <text x="262" y="44" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-style="italic" fill="#5B6B7D">for CPA firms</text>
</svg>
