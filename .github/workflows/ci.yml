name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: 'false'
      # Browser-public Amplitude SDK key (project 827681). MUST live on the
      # build job: Vite inlines VITE_* at build time into apps/app/dist, which
      # is uploaded as the staging-build artifact. Unset → analytics no-ops.
      VITE_AMPLITUDE_API_KEY: ${{ secrets.VITE_AMPLITUDE_API_KEY }}
      # Marketing (Astro) build-time var — inlined into apps/marketing/dist.
      # Same Amplitude project as the app (shared funnel). Unset → no-op.
      # (Cloudflare Web Analytics uses zone-level auto-injection, no token here.)
      PUBLIC_AMPLITUDE_API_KEY: ${{ secrets.PUBLIC_AMPLITUDE_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install --frozen-lockfile

      - run: vp run ci

      # Secret scan: gitleaks version pinned to match what developers install
      # locally (Day 1 rhythm §3); keep the CLI flags below aligned with the
      # `secrets:scan` script in package.json so CI and dev agree.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Keep in sync with the `secrets:scan` script in package.json.
      # We invoke gitleaks directly because `setup-vp` doesn't ship pnpm, and
      # pulling pnpm in just to run a one-liner isn't worth the complexity.
      - name: Secret scan
        run: gitleaks detect --source . --no-git --redact

      - name: Upload staging build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: |
            apps/app/dist
            apps/marketing/dist
          if-no-files-found: error
          retention-days: 1

  staging_change_filter:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        run: |
          before='${{ github.event.before }}'
          after='${{ github.sha }}'
          changed_files="$(mktemp)"

          if [[ "$before" =~ ^0+$ ]]; then
            git diff-tree --no-commit-id --name-only -r "$after" > "$changed_files"
          elif git cat-file -e "$before^{commit}" 2>/dev/null; then
            git diff --name-only "$before" "$after" > "$changed_files"
          else
            echo "Before commit is unavailable; defaulting to staging deploy."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          deploy=false
          while IFS= read -r file; do
            case "$file" in
              apps/app/*|apps/server/*|apps/marketing/*|packages/*|scripts/*)
                deploy=true
                break
                ;;
              .github/workflows/ci.yml|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json|vite.config.ts)
                deploy=true
                break
                ;;
            esac
          done < "$changed_files"

          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "Staging deploy required: $deploy"
          sed 's/^/- /' "$changed_files"

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.staging_change_filter.outputs.deploy == 'true'
    needs:
      - ci
      - staging_change_filter
    runs-on: ubuntu-latest
    environment: due-date-hq-staging
    env:
      CLOUDFLARE_ACCOUNT_ID: 305dbc7da819eb47bb3f3f3bc8927046
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_SEND_METRICS: 'false'
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
      PULSE_BROWSERLESS_TOKEN: ${{ secrets.PULSE_BROWSERLESS_TOKEN }}
      AI_GATEWAY_PROVIDER_API_KEY: ${{ secrets.AI_GATEWAY_PROVIDER_API_KEY }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_FIRM_MONTHLY: ${{ secrets.STRIPE_PRICE_FIRM_MONTHLY }}
      STRIPE_PRICE_FIRM_YEARLY: ${{ secrets.STRIPE_PRICE_FIRM_YEARLY }}
      STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
      STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
      STRIPE_PRICE_TEAM_MONTHLY: ${{ secrets.STRIPE_PRICE_TEAM_MONTHLY }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      SOCIAL_OPS_TOKEN: ${{ secrets.SOCIAL_OPS_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install deploy dependencies
        run: vp install --frozen-lockfile

      - name: Download staging build artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-build
          path: apps

      - name: Prepare Worker secrets
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const required = [
            'AUTH_SECRET',
            'GOOGLE_CLIENT_SECRET',
            'STRIPE_SECRET_KEY',
            'STRIPE_WEBHOOK_SECRET',
            'STRIPE_PRICE_PRO_MONTHLY',
            'STRIPE_PRICE_TEAM_MONTHLY',
            'PULSE_BROWSERLESS_TOKEN',
            'AI_GATEWAY_PROVIDER_API_KEY',
          ]
          const missing = required.filter((key) => !process.env[key])
          if (missing.length > 0) {
            throw new Error(`Missing required environment secrets: ${missing.join(', ')}`)
          }
          const resendKeys = ['RESEND_API_KEY', 'RESEND_WEBHOOK_SECRET']
          const hasAnyResendSecret = resendKeys.some((key) => process.env[key])
          const missingResendSecrets = hasAnyResendSecret
            ? resendKeys.filter((key) => !process.env[key])
            : []
          if (missingResendSecrets.length > 0) {
            throw new Error(
              [
                'Complete Resend setup requires both RESEND_API_KEY and RESEND_WEBHOOK_SECRET.',
                `Missing: ${missingResendSecrets.join(', ')}`,
              ].join(' '),
            )
          }
          const xKeys = [
            'X_API_KEY',
            'X_API_SECRET',
            'X_ACCESS_TOKEN',
            'X_ACCESS_TOKEN_SECRET',
          ]
          const hasAnyXCredential = xKeys.some((key) => process.env[key])
          const missingXCredentials = hasAnyXCredential
            ? xKeys.filter((key) => !process.env[key])
            : []
          if (missingXCredentials.length > 0) {
            throw new Error(
              `X OAuth credentials are all-or-none. Missing: ${missingXCredentials.join(', ')}`,
            )
          }

          const keys = [
            ...required,
            'RESEND_API_KEY',
            'RESEND_WEBHOOK_SECRET',
            'PULSE_BROWSERLESS_TOKEN',
            'AI_GATEWAY_PROVIDER_API_KEY',
            'AI_GATEWAY_API_KEY',
            'STRIPE_PRICE_FIRM_MONTHLY',
            'STRIPE_PRICE_FIRM_YEARLY',
            'STRIPE_PRICE_PRO_YEARLY',
            ...xKeys,
            'SOCIAL_OPS_TOKEN',
          ]
          const secrets = Object.fromEntries(
            keys
              .filter((key) => process.env[key])
              .map((key) => [key, process.env[key]]),
          )
          const file = path.join(process.env.RUNNER_TEMP, 'duedatehq-worker-secrets.json')
          fs.writeFileSync(file, JSON.stringify(secrets))
          fs.appendFileSync(process.env.GITHUB_ENV, `WRANGLER_SECRETS_FILE=${file}\n`)
          NODE

      - name: Publish staging
        run: vp run deploy:ci
